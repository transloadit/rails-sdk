name: CI
on: push
jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "2.2"
          - "2.3"
          - "jruby-9.4.14.0"
        gemfile:
          - "3.1"
          - "3.2"
          - "4.0"
          - "4.1"
          - "4.2"
          - "5.0"
        exclude:
          - ruby: "jruby-9.4.14.0"
            gemfile: "3.1"
          - ruby: "jruby-9.4.14.0"
            gemfile: "3.2"
          - ruby: "jruby-9.4.14.0"
            gemfile: "4.0"
          - ruby: "jruby-9.4.14.0"
            gemfile: "4.1"
          - ruby: "jruby-9.4.14.0"
            gemfile: "4.2"
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.gemfile }}.gemfile
    steps:
      - uses: actions/checkout@v2
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake test
